name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove --purge -y
        sudo apt-get clean

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev zstd

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Embed custom settings
      run: |
        cd openwrt
        mkdir -p files/etc/uci-defaults
        echo '#!/bin/sh' > files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.ipaddr='192.168.10.1'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.netmask='255.255.255.0'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.proto='static'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.wan.proto='dhcp'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].timezone='CST-8'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].zonename='Asia/Shanghai'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].hostname='OpenWrt'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set dropbear.@dropbear[0].Port='36000'" >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit network' >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit system' >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit dropbear' >> files/etc/uci-defaults/99-custom-settings
        echo 'exit 0' >> files/etc/uci-defaults/99-custom-settings
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Generate config
      run: |
        cd openwrt
        # === ALL config BEFORE defconfig ===
        # Target
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        echo "CONFIG_EFI_IMAGES=y" >> .config
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024" >> .config
        # Kernel modules
        echo "CONFIG_PACKAGE_kmod-ipt-string=y" >> .config
        # LuCI base
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
        # SSR Plus+
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
        # HelloWorld
        echo "CONFIG_PACKAGE_luci-app-vssr=y" >> .config
        # KMS
        echo "CONFIG_PACKAGE_luci-app-vlmcsd=y" >> .config
        # Bandwidth monitor
        echo "CONFIG_PACKAGE_luci-app-nlbwmon=y" >> .config
        # ServerChan
        echo "CONFIG_PACKAGE_luci-app-serverchan=y" >> .config
        # Access Control
        echo "CONFIG_PACKAGE_luci-app-accesscontrol=y" >> .config
        # Firewall
        echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
        # DDNS
        echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
        # UPnP
        echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
        # Autoreboot
        echo "CONFIG_PACKAGE_luci-app-autoreboot=y" >> .config
        # File Transfer
        echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
        # Tools
        echo "CONFIG_PACKAGE_tcpdump=y" >> .config
        # Disable problematic packages BEFORE defconfig
        echo "# CONFIG_PACKAGE_autosamba is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-fs-ksmbd is not set" >> .config
        echo "# CONFIG_PACKAGE_ksmbd-server is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ksmbd is not set" >> .config
        echo "# CONFIG_PACKAGE_samba4-libs is not set" >> .config
        echo "# CONFIG_PACKAGE_samba4-server is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-samba4 is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-vsftpd is not set" >> .config
        echo "# CONFIG_PACKAGE_vsftpd-alt is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ipsec-vpnd is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-xlnetacc is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-unblockmusic is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-jd-dailybonus is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-turboacc is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-wol is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-arpbind is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-diskman is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ttyd is not set" >> .config
        # === Run defconfig - this resolves all dependencies ===
        make defconfig
        # === AFTER defconfig: ONLY force-disable packages that defconfig might re-enable ===
        for pkg in \
          autosamba kmod-fs-ksmbd ksmbd-server \
          luci-app-ksmbd luci-i18n-ksmbd-zh-cn \
          samba4-libs samba4-server luci-app-samba4 \
          luci-app-vsftpd vsftpd-alt luci-i18n-vsftpd-zh-cn \
          luci-app-turboacc luci-i18n-turboacc-zh-cn \
          luci-app-wol luci-i18n-wol-zh-cn \
          luci-app-arpbind luci-i18n-arpbind-zh-cn \
          luci-app-diskman luci-i18n-diskman-zh-cn \
          luci-app-ttyd luci-i18n-ttyd-zh-cn ttyd \
          parted smartmontools blkid; do
          sed -i "s/CONFIG_PACKAGE_${pkg}=y/# CONFIG_PACKAGE_${pkg} is not set/" .config
        done
        sed -i '/CONFIG_DEFAULT_autosamba/d' .config
        sed -i '/autosamba_INCLUDE/d' .config
        sed -i '/CONFIG_KSMBD_SMB_INSECURE_SERVER/d' .config
        # === Verify ===
        echo "=== ENABLED luci-app packages ==="
        grep "CONFIG_PACKAGE_luci-app.*=y" .config | sort || true
        echo "=== kmod-ipt-string ==="
        grep "kmod-ipt-string" .config || true
        echo "=== tcpdump ==="
        grep "CONFIG_PACKAGE_tcpdump" .config || true
        echo "=== vssr (HelloWorld) ==="
        grep "vssr" .config || true
        echo "=== serverchan ==="
        grep "serverchan" .config || true
        echo "=== DISABLED check ==="
        grep -i "ksmbd\|autosamba\|samba4\|vsftpd\|turboacc\|arpbind\|wol\|diskman\|parted\|ttyd" .config | head -20 || true

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Prepare artifacts
      run: |
        cd openwrt/bin/targets/x86/64
        rm -f *.buildinfo *.manifest *.json sha256sums
        ls -lh

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_x86_64_firmware
        path: openwrt/bin/targets/x86/64/*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: OpenWrt x86_64 Build ${{ github.run_number }}
        files: openwrt/bin/targets/x86/64/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
