name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove --purge -y
        sudo apt-get clean

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev zstd

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        # Add helloworld feed
        echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate config
      run: |
        cd openwrt
        cat > .config << 'EOF'
        # Target
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y

        # EFI boot
        CONFIG_EFI_IMAGES=y
        CONFIG_TARGET_IMAGES_GZIP=y

        # Root filesystem size (1024MB)
        CONFIG_TARGET_ROOTFS_PARTSIZE=1024

        # ===== Kernel modules =====
        # String match for iptables (key module for blocking apps)
        CONFIG_PACKAGE_kmod-ipt-string=y

        # ===== LuCI =====
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

        # ===== Plugins =====
        # SSR Plus+
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y

        # Hello World
        CONFIG_PACKAGE_luci-app-vssr=y

        # Ad blocking (广告屏蔽大师 Plus+)
        CONFIG_PACKAGE_luci-app-adbyby-plus=y

        # KMS Server
        CONFIG_PACKAGE_luci-app-vlmcsd=y

        # MWAN3 (多线负载均衡)
        CONFIG_PACKAGE_luci-app-mwan3=y

        # Bandwidth monitor (带宽监控)
        CONFIG_PACKAGE_luci-app-nlbwmon=y

        # ServerChan (微信推送)
        CONFIG_PACKAGE_luci-app-serverchan=y

        # Firewall
        CONFIG_PACKAGE_luci-app-firewall=y

        # DDNS
        CONFIG_PACKAGE_luci-app-ddns=y

        # UPnP
        CONFIG_PACKAGE_luci-app-upnp=y

        # Turbo ACC (网络加速)
        CONFIG_PACKAGE_luci-app-turboacc=y

        # ttyd (Web终端)
        CONFIG_PACKAGE_luci-app-ttyd=y

        # ===== Extra tools =====
        CONFIG_PACKAGE_tcpdump=y
        CONFIG_PACKAGE_iperf3=y
        EOF

        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Prepare artifacts
      run: |
        cd openwrt/bin/targets/x86/64
        # Remove unnecessary files to save space
        rm -f *.buildinfo *.manifest *.json sha256sums
        gzip -d *.gz || true
        ls -lh

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_x86_64_firmware
        path: openwrt/bin/targets/x86/64/*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: OpenWrt x86_64 Build ${{ github.run_number }}
        files: openwrt/bin/targets/x86/64/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
