name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove --purge -y
        sudo apt-get clean

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev zstd

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Embed custom settings
      run: |
        cd openwrt
        mkdir -p files/etc/uci-defaults
        # Create first-boot script for network and system settings
        echo '#!/bin/sh' > files/etc/uci-defaults/99-custom-settings
        echo '' >> files/etc/uci-defaults/99-custom-settings
        echo '# === LAN settings ===' >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.ipaddr='192.168.10.1'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.netmask='255.255.255.0'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.lan.proto='static'" >> files/etc/uci-defaults/99-custom-settings
        echo '' >> files/etc/uci-defaults/99-custom-settings
        echo '# === WAN settings ===' >> files/etc/uci-defaults/99-custom-settings
        echo "uci set network.wan.proto='dhcp'" >> files/etc/uci-defaults/99-custom-settings
        echo '' >> files/etc/uci-defaults/99-custom-settings
        echo '# === System settings ===' >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].timezone='CST-8'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].zonename='Asia/Shanghai'" >> files/etc/uci-defaults/99-custom-settings
        echo "uci set system.@system[0].hostname='OpenWrt'" >> files/etc/uci-defaults/99-custom-settings
        echo '' >> files/etc/uci-defaults/99-custom-settings
        echo '# === SSH port ===' >> files/etc/uci-defaults/99-custom-settings
        echo "uci set dropbear.@dropbear[0].Port='36000'" >> files/etc/uci-defaults/99-custom-settings
        echo '' >> files/etc/uci-defaults/99-custom-settings
        echo '# === Commit ===' >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit network' >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit system' >> files/etc/uci-defaults/99-custom-settings
        echo 'uci commit dropbear' >> files/etc/uci-defaults/99-custom-settings
        echo 'exit 0' >> files/etc/uci-defaults/99-custom-settings
        chmod +x files/etc/uci-defaults/99-custom-settings
        echo "=== First-boot script content ==="
        cat files/etc/uci-defaults/99-custom-settings

    - name: Generate config
      run: |
        cd openwrt
        # === Step 1: Write initial .config ===
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        echo "CONFIG_EFI_IMAGES=y" >> .config
        echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024" >> .config
        # Kernel modules
        echo "CONFIG_PACKAGE_kmod-ipt-string=y" >> .config
        # LuCI base
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
        # SSR Plus+
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
        # HelloWorld
        echo "CONFIG_PACKAGE_luci-app-vssr=y" >> .config
        # KMS Server
        echo "CONFIG_PACKAGE_luci-app-vlmcsd=y" >> .config
        # Bandwidth monitor
        echo "CONFIG_PACKAGE_luci-app-nlbwmon=y" >> .config
        # ServerChan
        echo "CONFIG_PACKAGE_luci-app-serverchan=y" >> .config
        # Access Control
        echo "CONFIG_PACKAGE_luci-app-accesscontrol=y" >> .config
        # Firewall
        echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
        # DDNS
        echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
        # UPnP
        echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
        # ttyd Web Terminal
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        # Autoreboot
        echo "CONFIG_PACKAGE_luci-app-autoreboot=y" >> .config
        # Disk Manager
        echo "CONFIG_PACKAGE_luci-app-diskman=y" >> .config
        # File Transfer
        echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
        # Tools
        echo "CONFIG_PACKAGE_tcpdump=y" >> .config
        # === Packages to DISABLE ===
        echo "# CONFIG_PACKAGE_autosamba is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-fs-ksmbd is not set" >> .config
        echo "# CONFIG_PACKAGE_ksmbd-server is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ksmbd is not set" >> .config
        echo "# CONFIG_PACKAGE_samba4-libs is not set" >> .config
        echo "# CONFIG_PACKAGE_samba4-server is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-samba4 is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-vsftpd is not set" >> .config
        echo "# CONFIG_PACKAGE_vsftpd-alt is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ipsec-vpnd is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-xlnetacc is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-unblockmusic is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-jd-dailybonus is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-turboacc is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-wol is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-arpbind is not set" >> .config
        # === Step 2: Run defconfig ===
        make defconfig
        # === Step 3: Force-enable key packages after defconfig ===
        sed -i 's/# CONFIG_PACKAGE_kmod-ipt-string is not set/CONFIG_PACKAGE_kmod-ipt-string=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus is not set/CONFIG_PACKAGE_luci-app-ssr-plus=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray is not set/CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-vssr is not set/CONFIG_PACKAGE_luci-app-vssr=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-serverchan is not set/CONFIG_PACKAGE_luci-app-serverchan=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-accesscontrol is not set/CONFIG_PACKAGE_luci-app-accesscontrol=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-vlmcsd is not set/CONFIG_PACKAGE_luci-app-vlmcsd=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-nlbwmon is not set/CONFIG_PACKAGE_luci-app-nlbwmon=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ddns is not set/CONFIG_PACKAGE_luci-app-ddns=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-upnp is not set/CONFIG_PACKAGE_luci-app-upnp=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ttyd is not set/CONFIG_PACKAGE_luci-app-ttyd=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-autoreboot is not set/CONFIG_PACKAGE_luci-app-autoreboot=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-diskman is not set/CONFIG_PACKAGE_luci-app-diskman=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-filetransfer is not set/CONFIG_PACKAGE_luci-app-filetransfer=y/' .config
        sed -i 's/# CONFIG_PACKAGE_tcpdump is not set/CONFIG_PACKAGE_tcpdump=y/' .config
        # === Step 4: Force-disable problematic packages after defconfig ===
        sed -i 's/CONFIG_PACKAGE_autosamba=y/# CONFIG_PACKAGE_autosamba is not set/' .config
        sed -i 's/CONFIG_PACKAGE_kmod-fs-ksmbd=y/# CONFIG_PACKAGE_kmod-fs-ksmbd is not set/' .config
        sed -i 's/CONFIG_PACKAGE_ksmbd-server=y/# CONFIG_PACKAGE_ksmbd-server is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-ksmbd=y/# CONFIG_PACKAGE_luci-app-ksmbd is not set/' .config
        sed -i 's/CONFIG_PACKAGE_samba4-libs=y/# CONFIG_PACKAGE_samba4-libs is not set/' .config
        sed -i 's/CONFIG_PACKAGE_samba4-server=y/# CONFIG_PACKAGE_samba4-server is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-samba4=y/# CONFIG_PACKAGE_luci-app-samba4 is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        sed -i 's/CONFIG_PACKAGE_vsftpd-alt=y/# CONFIG_PACKAGE_vsftpd-alt is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-turboacc=y/# CONFIG_PACKAGE_luci-app-turboacc is not set/' .config
        # === Step 5: Verify ===
        echo "=== ENABLED luci-app packages ==="
        grep "CONFIG_PACKAGE_luci-app.*=y" .config | sort
        echo "=== kmod-ipt-string status ==="
        grep "kmod-ipt-string" .config
        echo "=== tcpdump status ==="
        grep "CONFIG_PACKAGE_tcpdump" .config
        echo "=== ksmbd/samba/autosamba (should all be 'not set') ==="
        grep -i "ksmbd\|autosamba\|samba4" .config

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Prepare artifacts
      run: |
        cd openwrt/bin/targets/x86/64
        rm -f *.buildinfo *.manifest *.json sha256sums
        ls -lh

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_x86_64_firmware
        path: openwrt/bin/targets/x86/64/*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: OpenWrt x86_64 Build ${{ github.run_number }}
        files: openwrt/bin/targets/x86/64/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
